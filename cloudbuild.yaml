steps:
  # Deploy to Cloud Run using native Buildpacks (bypasses Kaniko and Dockerfile caching completely)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'ai-powered-sales-and-automation-persuasion'
      - '--source'
      - '.'
      - '--region'
      - 'europe-west1'
      - '--allow-unauthenticated'

options:
  logging: CLOUD_LOGGING_ONLY
