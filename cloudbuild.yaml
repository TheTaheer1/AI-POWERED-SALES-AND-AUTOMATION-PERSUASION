steps:
  # Build the container image using native docker build (bypasses Kaniko bug)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/github.com/thetaheer1/ai-powered-sales-and-automation-persuasion:$COMMIT_SHA', '.']
  
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/github.com/thetaheer1/ai-powered-sales-and-automation-persuasion:$COMMIT_SHA']
    
images:
  - 'gcr.io/$PROJECT_ID/github.com/thetaheer1/ai-powered-sales-and-automation-persuasion:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
